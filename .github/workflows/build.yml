name: Build multiplataforma

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # --------------------------------------------------------------------- #
  test:
    name: Tests (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run unit tests
        run: python -m unittest -v test_netaudit.py

  # --------------------------------------------------------------------- #
  # Binarios CLI (stdlib, pequeños) para Linux y Windows
  build-cli:
    name: Build CLI (${{ matrix.os }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: netaudit-linux-x64
          - os: windows-latest
            asset: netaudit-windows-x64.exe
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
      - name: Build binary
        run: pyinstaller --onefile --name netaudit --console network_analyzer.py
      - name: Smoke test
        shell: bash
        run: |
          ./dist/netaudit* --no-lan --no-public --fast -o /tmp/smoke.html || true
          test -f /tmp/smoke.html && echo "OK" || echo "sin smoke (no critico)"
      - name: Rename artifact
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            mv dist/netaudit.exe "${{ matrix.asset }}"
          else
            mv dist/netaudit "${{ matrix.asset }}"; chmod +x "${{ matrix.asset }}"
          fi
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}

  # --------------------------------------------------------------------- #
  # App Qt (PySide6) de escritorio para Linux y Windows
  build-gui-desktop:
    name: Build GUI Qt (${{ matrix.os }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: netaudit-linux-gui
          - os: windows-latest
            asset: netaudit-windows-gui.exe
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pyside6
      - name: Build Qt GUI
        run: pyinstaller --onefile --windowed --name netaudit-gui netaudit_qt.py
      - name: Rename artifact
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            mv dist/netaudit-gui.exe "${{ matrix.asset }}"
          else
            mv dist/netaudit-gui "${{ matrix.asset }}"; chmod +x "${{ matrix.asset }}"
          fi
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}

  # --------------------------------------------------------------------- #
  # App de macOS (Qt) con instalador .dmg
  build-macos:
    name: Build macOS (.dmg Qt)
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pillow pyside6
          brew install create-dmg || true
      - name: Generate icon & DMG background
        run: python make_assets.py
      - name: Build .icns
        run: iconutil -c icns netaudit.iconset -o netaudit.icns
      - name: Build Qt .app
        run: |
          pyinstaller --windowed --name netaudit \
            --icon netaudit.icns \
            --osx-bundle-identifier com.netaudit.app \
            netaudit_qt.py
      - name: Build CLI binary (macOS)
        run: pyinstaller --onefile --name netaudit-cli --console network_analyzer.py
      - name: Create .dmg
        run: |
          set -x
          create-dmg \
            --volname "netaudit" \
            --background "assets/dmg_background.png" \
            --window-pos 200 120 \
            --window-size 640 420 \
            --icon-size 110 \
            --icon "netaudit.app" 170 250 \
            --hide-extension "netaudit.app" \
            --app-drop-link 470 250 \
            "netaudit-macos.dmg" "dist/netaudit.app" || true
          if [ ! -f netaudit-macos.dmg ]; then
            hdiutil create -volname "netaudit" -srcfolder "dist/netaudit.app" \
              -ov -format UDZO "netaudit-macos.dmg"
          fi
          mv dist/netaudit-cli netaudit-macos-arm64 || true
          chmod +x netaudit-macos-arm64 || true
          ls -lh netaudit-macos.dmg
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: netaudit-macos
          path: |
            netaudit-macos.dmg
            netaudit-macos-arm64
      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            netaudit-macos.dmg
            netaudit-macos-arm64
